name: Build WDA
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Import Certificate
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          echo "$P12_BASE64" | tr -d '\n\r ' | base64 --decode > cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          openssl pkcs12 -in cert.p12 -passin pass:$P12_PASSWORD \
            -legacy -nodes -out cert.pem
          openssl x509 -in cert.pem -out cert_only.pem
          openssl rsa -in cert.pem -out key.pem
          security import cert_only.pem -k build.keychain -T /usr/bin/codesign
          security import key.pem -k build.keychain -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "" build.keychain

      - name: Install Profile
        env:
          PROFILE_BASE64: ${{ secrets.MOBILEPROVISION_BASE64 }}
        run: |
          echo "$PROFILE_BASE64" | tr -d '\n\r ' | base64 --decode > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(security cms -D -i profile.mobileprovision | plutil -extract UUID raw -)
          cp profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

      - name: Build
        run: |
          UUID=$(security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision | plutil -extract UUID raw -)
          xcodebuild archive \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination "generic/platform=iOS" \
            -archivePath WDA.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            DEVELOPMENT_TEAM=${{ secrets.TEAM_ID }} \
            PROVISIONING_PROFILE=$UUID \
            PRODUCT_BUNDLE_IDENTIFIER=com.RsQ9.j8fEG \
            -allowProvisioningUpdates

      - name: Package IPA
        run: |
          mkdir Payload
          cp -r WDA.xcarchive/Products/Applications/WebDriverAgentRunner.app Payload/
          zip -r WDA.ipa Payload/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: WDA
          path: WDA.ipa
