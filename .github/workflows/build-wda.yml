name: Build WDA
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Import Certificate
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          echo "$P12_BASE64" | tr -d '\n\r ' | base64 --decode > cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          openssl pkcs12 -in cert.p12 -passin pass:$P12_PASSWORD \
            -legacy -nodes -out cert.pem
          openssl x509 -in cert.pem -out cert_only.pem
          openssl rsa -in cert.pem -out key.pem
          security import cert_only.pem -k build.keychain -T /usr/bin/codesign
          security import key.pem -k build.keychain -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "" build.keychain

      - name: Install Profile
        env:
          PROFILE_BASE64: ${{ secrets.MOBILEPROVISION_BASE64 }}
        run: |
          echo "$PROFILE_BASE64" | base64 --decode > profile.mobileprovision
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          UUID=$(security cms -D -i profile.mobileprovision | /usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin)
          cp profile.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"
          echo "PROFILE_PATH=$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision" >> $GITHUB_ENV
          echo "PROFILE_UUID=$UUID" >> $GITHUB_ENV

      - name: Build
        run: |
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination "generic/platform=iOS" \
            -derivedDataPath DerivedData \
            PRODUCT_BUNDLE_IDENTIFIER=com.RsQ9.j8fEG

      - name: Sign and Package
        run: |
          UUID="${{ env.PROFILE_UUID }}"
          if [ -z "$UUID" ]; then
            echo "Error: PROFILE_UUID not set" && exit 1
          fi

          PROFILE_PATH="${{ env.PROFILE_PATH }}"
          CERT_NAME="iPhone Distribution: Liv Aune (RYUXF59JN4)"
          echo "Using profile at: $PROFILE_PATH"

          if [ ! -f "$PROFILE_PATH" ]; then
            echo "Error: Profile file not found at $PROFILE_PATH"
            exit 1
          fi
          if [ ! -s "$PROFILE_PATH" ]; then
            echo "Error: Profile file is empty (zero length)"
            exit 1
          fi

          APP=$(find DerivedData -name "WebDriverAgentRunner-Runner.app" ! -path "*/iphonesimulator/*" | head -1)
          if [ -z "$APP" ]; then
            echo "Error: App not found" && exit 1
          fi

          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.RsQ9.j8fEG" "$APP/Info.plist"
          cp "$PROFILE_PATH" "$APP/embedded.mobileprovision"
          if [ ! -s "$APP/embedded.mobileprovision" ]; then
            echo "Error: Failed to copy profile to app bundle" && exit 1
          fi

          security cms -D -i "$PROFILE_PATH" \
            | /usr/libexec/PlistBuddy -x -c "Print :Entitlements" /dev/stdin > ent.plist

          find "$APP" \( -name "*.dylib" -o -name "*.framework" \) \
            -exec codesign -f -s "$CERT_NAME" {} \;
          codesign -f -s "$CERT_NAME" --entitlements ent.plist "$APP"

          mkdir Payload && cp -r "$APP" Payload/
          zip -r WDA.ipa Payload/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: WDA
          path: WDA.ipa
